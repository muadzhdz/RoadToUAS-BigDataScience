# Data Specification for Supermarket Sales Analysis
# Structured metadata for AI CLI processing

project:
  name: "Supermarket Sales Analysis"
  dataset: "supermarket_sales.csv"
  dataset_path: "datasets/retail/supermarket_sales.csv"
  rows: 1000
  columns: 17
  date_range: "2019-01-01 to 2019-03-09"
  cleanliness_summary:
    missing_values: 0
    duplicate_invoice_ids: 0
    categorical_format: "consistent"
    required_preparation:
      - "Parse Date from string M/D/YYYY to Date in Tableau"
      - "Use Time string HH:MM to create Hour = INT(LEFT([Time], 2))"
  branches:
    - code: "A"
      city: "Yangon"
    - code: "B"
      city: "Mandalay"
    - code: "C"
      city: "Naypyitaw"

fields:
  - name: "Invoice ID"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    description: "Unique transaction identifier"

  - name: "Branch"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    categories: ["A", "B", "C"]
    description: "Branch code"

  - name: "City"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    categories: ["Yangon", "Mandalay", "Naypyitaw"]
    description: "City location"

  - name: "Customer type"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    categories: ["Member", "Normal"]
    description: "Customer loyalty status"

  - name: "Gender"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    categories: ["Male", "Female"]
    description: "Customer gender"

  - name: "Product line"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    categories:
      - "Electronic accessories"
      - "Fashion accessories"
      - "Food and beverages"
      - "Health and beauty"
      - "Home and lifestyle"
      - "Sports and travel"
    description: "Product category"

  - name: "Unit price"
    current_type: "number"
    target_type: "number"
    role: "measure"
    min: 10.08
    max: 99.96
    description: "Price per unit in USD"

  - name: "Quantity"
    current_type: "number"
    target_type: "number"
    role: "measure"
    min: 1
    max: 10
    description: "Units purchased"

  - name: "Tax 5%"
    current_type: "number"
    target_type: "number"
    role: "measure"
    description: "5% tax amount"

  - name: "Total"
    current_type: "number"
    target_type: "number"
    role: "measure"
    min: 10.68
    max: 1042.65
    description: "Transaction total after tax"

  - name: "Date"
    current_type: "string"
    target_type: "date"
    role: "dimension"
    format: "M/D/YYYY"
    description: "Transaction date - requires parsing"

  - name: "Time"
    current_type: "string"
    target_type: "datetime"
    role: "dimension"
    format: "HH:MM"
    description: "Transaction time - extract hour"

  - name: "Payment"
    current_type: "string"
    target_type: "string"
    role: "dimension"
    categories: ["Cash", "Ewallet", "Credit card"]
    description: "Payment method"

  - name: "cogs"
    current_type: "number"
    target_type: "number"
    role: "measure"
    description: "Cost of goods sold"

  - name: "gross margin percentage"
    current_type: "number"
    target_type: "number"
    role: "measure"
    fixed_value: 4.761904762
    description: "Fixed gross margin %"

  - name: "gross income"
    current_type: "number"
    target_type: "number"
    role: "measure"
    description: "Gross profit"

  - name: "Rating"
    current_type: "number"
    target_type: "number"
    role: "measure"
    min: 4.0
    max: 10.0
    description: "Customer satisfaction 1-10"

calculated_fields:
  - name: "Hour"
    formula: "INT(LEFT([Time], 2))"
    return_type: "number"
    description: "Extract hour from Time string"

  - name: "Day of Week"
    formula: "DATENAME('weekday', [Date])"
    return_type: "string"
    description: "Day name from Date"

  - name: "Month"
    formula: "DATENAME('month', [Date])"
    return_type: "string"
    description: "Month name from Date"

  - name: "Revenue per Unit"
    formula: "[Total] / [Quantity]"
    return_type: "number"
    description: "Average price per unit sold"

  - name: "Rating Category"
    formula: "IF [Rating] >= 9 THEN 'High' ELSEIF [Rating] >= 7 THEN 'Medium' ELSE 'Low' END"
    return_type: "string"
    description: "Categorize rating"

  - name: "Transaction Size"
    formula: "IF [Quantity] >= 7 THEN 'Large' ELSEIF [Quantity] >= 4 THEN 'Medium' ELSE 'Small' END"
    return_type: "string"
    description: "Size by quantity"

  - name: "Week Number"
    formula: "DATEPART('week', [Date])"
    return_type: "number"
    description: "Week of year"

validation_rules:
  missing_values:
    expected: 0
    check_all_columns: true
  
  duplicates:
    field: "Invoice ID"
    count_expected: 1000
    count_distinct_expected: 1000
  
  format_consistency:
    fields: ["City", "Branch", "Customer type", "Gender", "Product line", "Payment"]
    check: "unique_values_consistent"
  
  outliers:
    method: "IQR"
    fields: ["Total", "Unit price", "Quantity", "Rating", "gross income"]
    expected: "no_extreme_outliers"
  
  numeric_relationships:
    - check: "Total = cogs + gross income"
      tolerance: 0.01
    - check: "gross income = Total - cogs"
      tolerance: 0.01
    - check: "Tax 5% = Total * 5/105"
      tolerance: 0.01

